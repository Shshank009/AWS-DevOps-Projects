<!DOCTYPE html>
<html>
<head>
    <title>Two Tier Flask App</title>
</head>
<body>
    <h1>Messages</h1>
    <form action="/submit" method="POST">
        <input type="text" name="new_message" placeholder="Enter a message">
        <button type="submit">Submit</button>
    </form>
    <ul>
        {% for message in messages %}
            <li>{{ message[0] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
